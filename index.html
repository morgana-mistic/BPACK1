<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Souvenir Digital</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-1: #0b0b10;
      --bg-2: #14141d;
      --bg-3: #1b1620;
      --card: rgba(23, 23, 31, 0.86);
      --card-2: rgba(30, 30, 40, 0.92);
      --border: rgba(255, 222, 173, 0.14);
      --border-strong: rgba(255, 222, 173, 0.24);
      --gold: #f0d39a;
      --gold-soft: #d8b980;
      --text: #f7f2ea;
      --text-soft: rgba(247, 242, 234, 0.72);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      --shadow-soft: 0 10px 28px rgba(0, 0, 0, 0.28);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    body {
      font-family: Georgia, serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(130, 92, 50, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(88, 60, 120, 0.12), transparent 28%),
        radial-gradient(circle at bottom center, rgba(255, 215, 150, 0.06), transparent 32%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
      background-attachment: fixed;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 26px 18px 42px;
    }

    .shell {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 18px 18px 26px;
      position: relative;
      overflow: hidden;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 26%),
        radial-gradient(circle at top right, rgba(240, 211, 154, 0.08), transparent 30%);
    }

    .hero {
      position: relative;
      z-index: 1;
      margin-bottom: 20px;
    }

    .hero img {
      width: 100%;
      max-width: 620px;
      display: block;
      margin: 0 auto;
      border-radius: 22px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 18px 42px rgba(0,0,0,0.35);
    }

    .buttons {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 18px;
    }

    .main-btn {
      width: 100%;
      border: 1px solid rgba(255, 222, 173, 0.10);
      border-radius: var(--radius-lg);
      padding: 22px 22px;
      text-align: left;
      cursor: pointer;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%);
      box-shadow: var(--shadow-soft);
      transition: transform 0.18s ease, box-shadow 0.22s ease, border-color 0.22s ease, background 0.22s ease;
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--text);
      font-family: inherit;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .main-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.36);
      border-color: var(--border-strong);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.04) 100%);
    }

    .main-btn:active {
      transform: translateY(0);
    }

    .btn-icon {
      flex: 0 0 68px;
      width: 68px;
      height: 68px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background:
        linear-gradient(180deg, rgba(240, 211, 154, 0.18) 0%, rgba(240, 211, 154, 0.08) 100%);
      border: 1px solid rgba(240, 211, 154, 0.18);
      color: var(--gold);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .btn-content {
      flex: 1;
      min-width: 0;
    }

    .btn-title {
      display: block;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 6px;
      line-height: 1.2;
      letter-spacing: 0.2px;
    }

    .btn-text {
      display: block;
      font-size: 0.98rem;
      line-height: 1.5;
      color: var(--text-soft);
    }

    .signature {
      margin-top: 28px;
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.82;
      position: relative;
      z-index: 1;
    }

    .signature a {
      color: var(--gold-soft);
      text-decoration: none;
      border-bottom: 1px solid rgba(216, 185, 128, 0.35);
    }

    .signature a:hover {
      opacity: 0.9;
    }

    /* MODALES */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5, 5, 8, 0.72);
      z-index: 999;
      justify-content: center;
      align-items: center;
      padding: 18px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      background: var(--card-2);
      width: min(900px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 24px;
      padding: 24px 18px 18px;
      position: relative;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
      text-align: left;
      border: 1px solid rgba(255, 222, 173, 0.10);
      color: var(--text);
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      font-size: 1.8rem;
      cursor: pointer;
      color: var(--gold);
      line-height: 1;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .close-btn:hover {
      background: rgba(255,255,255,0.12);
      transform: scale(1.04);
    }

    .modal-title {
      text-align: center;
      font-size: 1.55rem;
      margin-bottom: 20px;
      color: var(--gold);
      padding-right: 38px;
    }

    /* MÚSICA */
    .track-list {
      display: grid;
      gap: 14px;
    }

    .track {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255, 222, 173, 0.08);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow-soft);
    }

    .track h3 {
      font-size: 1rem;
      margin-bottom: 10px;
      color: var(--gold);
    }

    .track audio {
      width: 100%;
      filter: brightness(0.95);
    }

    /* FOTOS */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .gallery img {
      width: 100%;
      display: block;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.24);
      object-fit: cover;
      aspect-ratio: 4 / 5;
      cursor: zoom-in;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .gallery img:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 32px rgba(0,0,0,0.30);
    }

    /* FORMULARIO */
    .form-wrap {
      width: 100%;
      min-height: 70vh;
    }

    .form-wrap iframe {
      width: 100%;
      height: 75vh;
      border: none;
      border-radius: 16px;
      background: #fff;
    }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(5, 5, 8, 0.84);
      justify-content: center;
      align-items: center;
      padding: 20px;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: min(92vw, 1000px);
      max-height: 88vh;
      border-radius: 18px;
      box-shadow: 0 24px 50px rgba(0,0,0,0.40);
      object-fit: contain;
      background: #111;
    }

    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      line-height: 1;
    }

    @media (max-width: 640px) {
      .container {
        padding: 18px 14px 30px;
      }

      .shell {
        padding: 14px 14px 22px;
      }

      .buttons {
        gap: 14px;
      }

      .main-btn {
        padding: 18px 16px;
        gap: 14px;
        border-radius: 18px;
      }

      .btn-icon {
        width: 58px;
        height: 58px;
        font-size: 1.7rem;
        border-radius: 16px;
        flex-basis: 58px;
      }

      .btn-title {
        font-size: 1.06rem;
      }

      .btn-text {
        font-size: 0.92rem;
      }

      .modal-box {
        padding: 22px 14px 16px;
        border-radius: 20px;
      }

      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="shell">

      <section class="hero">
        <img src="pareja.png" alt="Foto de la pareja" />
      </section>

      <section class="buttons">
        <button class="main-btn" onclick="openModal('musicModal')">
          <span class="btn-icon">🎵</span>
          <span class="btn-content">
            <span class="btn-title">Nuestra música</span>
            <span class="btn-text">Escuchá las canciones que forman parte de nuestra historia.</span>
          </span>
        </button>

        <button class="main-btn" onclick="openModal('photosModal')">
          <span class="btn-icon">📷</span>
          <span class="btn-content">
            <span class="btn-title">Nuestras fotos</span>
            <span class="btn-text">Un pequeño recorrido por recuerdos, momentos y escenas compartidas.</span>
          </span>
        </button>

        <button class="main-btn" onclick="openModal('messageModal')">
          <span class="btn-icon">💌</span>
          <span class="btn-content">
            <span class="btn-title">Dejanos un mensaje</span>
            <span class="btn-text">Escribinos unas palabras para guardar el recuerdo de este día.</span>
          </span>
        </button>

        <!-- ESTE BLOQUE SE MUESTRA U OCULTA AUTOMÁTICAMENTE SEGÚN LA VARIABLE DEL SCRIPT -->
        <button class="main-btn" id="wallButton" onclick="window.location.href='mensajes.html'">
          <span class="btn-icon">✨</span>
          <span class="btn-content">
            <span class="btn-title">Muro de mensajes</span>
            <span class="btn-text">Leé los mensajes, dedicatorias y recuerdos que fueron dejando los invitados.</span>
          </span>
        </button>
      </section>

      <div class="signature">
        <a href="https://wa.me/5493854118422?text=Hola%20Morgana,%20vi%20tu%20souvenir%20digital%20y%20quiero%20consultarte." target="_blank" rel="noopener noreferrer">
          Diseño digital de Morgana
        </a>
      </div>
    </div>
  </div>

  <!-- Modal Música -->
  <div class="modal" id="musicModal">
    <div class="modal-box">
      <button class="close-btn" onclick="closeModal('musicModal')" aria-label="Cerrar">×</button>
      <h2 class="modal-title">🎵 Nuestra música</h2>

      <div class="track-list">
        <div class="track">
          <h3>Tema 1</h3>
          <audio controls preload="none">
            <source src="tema1.mp3" type="audio/mpeg">
            Tu navegador no soporta audio HTML5.
          </audio>
        </div>

        <div class="track">
          <h3>Tema 2</h3>
          <audio controls preload="none">
            <source src="tema2.mp3" type="audio/mpeg">
            Tu navegador no soporta audio HTML5.
          </audio>
        </div>

        <div class="track">
          <h3>Tema 3</h3>
          <audio controls preload="none">
            <source src="tema3.mp3" type="audio/mpeg">
            Tu navegador no soporta audio HTML5.
          </audio>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Fotos -->
  <div class="modal" id="photosModal">
    <div class="modal-box">
      <button class="close-btn" onclick="closeModal('photosModal')" aria-label="Cerrar">×</button>
      <h2 class="modal-title">📷 Nuestras fotos</h2>

      <div class="gallery">
        <img src="foto1.jpg" alt="Foto 1" onclick="openLightbox(this.src)">
        <img src="foto2.jpg" alt="Foto 2" onclick="openLightbox(this.src)">
        <img src="foto3.jpg" alt="Foto 3" onclick="openLightbox(this.src)">
      </div>
    </div>
  </div>

  <!-- Modal Formulario -->
  <div class="modal" id="messageModal">
    <div class="modal-box">
      <button class="close-btn" onclick="closeModal('messageModal')" aria-label="Cerrar">×</button>
      <h2 class="modal-title">💌 Dejanos un mensaje</h2>

      <div class="form-wrap">
        <iframe
          src="https://tally.so/r/q4gjv9"
          title="Formulario de mensajes"
          loading="lazy">
        </iframe>
      </div>
    </div>
  </div>

  <!-- Lightbox fotos -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()" aria-label="Cerrar">×</button>
    <img id="lightboxImage" src="" alt="Foto ampliada">
  </div>

  <script>
    /************************************************************
     * CONFIGURACIÓN RÁPIDA
     * true  = mostrar botón "Muro de mensajes"
     * false = ocultar botón "Muro de mensajes"
     ************************************************************/
    const SHOW_WALL_BUTTON = true;

    const wallButton = document.getElementById('wallButton');

    if (!SHOW_WALL_BUTTON && wallButton) {
      wallButton.style.display = 'none';
    }

    function openModal(id) {
      document.getElementById(id).classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
      document.body.style.overflow = '';
    }

    function openLightbox(src) {
      document.getElementById('lightboxImage').src = src;
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.getElementById('lightboxImage').src = '';
      document.body.style.overflow = '';
    }

    window.addEventListener('click', function(e) {
      document.querySelectorAll('.modal').forEach(modal => {
        if (e.target === modal) {
          modal.classList.remove('active');
          document.body.style.overflow = '';
        }
      });

      const lightbox = document.getElementById('lightbox');
      if (e.target === lightbox) {
        closeLightbox();
      }
    });

    window.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal.active').forEach(modal => {
          modal.classList.remove('active');
        });

        if (document.getElementById('lightbox').classList.contains('active')) {
          closeLightbox();
        } else {
          document.body.style.overflow = '';
        }
      }
    });
  </script>
</body>
</html>
