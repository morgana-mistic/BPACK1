<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensajes para los Novios</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f12;
    color: #fff;
}

header {
    text-align: center;
    padding: 60px 20px 30px;
}

header h1 {
    font-size: 32px;
    margin: 0;
    letter-spacing: 1px;
}

header p {
    opacity: 0.7;
    margin-top: 10px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 1000px;
    margin: auto;
}

.card {
    background: #1b1b22;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: transform 0.2s ease;
}

.card:hover {
    transform: translateY(-5px);
}

.name {
    font-weight: bold;
    margin-bottom: 10px;
    color: #ffd36e;
}

.message {
    font-size: 14px;
    line-height: 1.5;
    opacity: 0.9;
}

.date {
    margin-top: 15px;
    font-size: 11px;
    opacity: 0.5;
}
</style>

</head>

<body>

<header>
    <h1>💌 Mensajes para los Novios</h1>
    <p>Palabras de amor, alegría y recuerdos de su día especial</p>
</header>

<div class="container" id="messages"></div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRMxc6lrRDsvXS4rR2Sh87zs-VqaMsfi1t2S2GhiPbAaTC6SF7YL1_h7MCdF4BSbjJ7adHGuglgAr_j/pub?gid=0&single=true&output=csv";

const container = document.getElementById("messages");

function parseCSVLine(line) {
    // separa respetando comillas
    const result = [];
    let current = "";
    let insideQuotes = false;

    for (let i = 0; i < line.length; i++) {
        const char = line[i];

        if (char === '"' && line[i - 1] !== "\\") {
            insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
            result.push(current);
            current = "";
        } else {
            current += char;
        }
    }

    result.push(current);
    return result.map(v => v.replace(/"/g, "").trim());
}

fetch(SHEET_URL)
  .then(res => res.text())
  .then(text => {

    container.innerHTML = "";

    const rows = text.trim().split("\n");
    const headers = parseCSVLine(rows[0].toLowerCase());

    const nameIndex = headers.findIndex(h => h.includes("name") || h.includes("nombre"));
    const messageIndex = headers.findIndex(h => h.includes("message") || h.includes("mensaje"));
    const dateIndex = headers.findIndex(h => h.includes("date") || h.includes("fecha"));

    const nIdx = nameIndex >= 0 ? nameIndex : 0;
    const mIdx = messageIndex >= 0 ? messageIndex : 1;
    const dIdx = dateIndex >= 0 ? dateIndex : 2;

    rows.slice(1).forEach(row => {

        if (!row.trim()) return;

        const cols = parseCSVLine(row);

        const name = cols[nIdx] || "Invitado";
        const message = cols[mIdx] || "";
        const date = cols[dIdx] || "";

        if (!message) return;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="name">${name}</div>
            <div class="message">${message}</div>
            <div class="date">${date}</div>
        `;

        container.appendChild(card);
    });

  })
  .catch(err => {
    console.error(err);
    container.innerHTML = "<p style='opacity:0.6; text-align:center;'>No se pudieron cargar los mensajes.</p>";
  });

</script>

</body>
</html>
