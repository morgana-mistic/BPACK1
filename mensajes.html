<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensajes para los Novios</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a22, #0b0b0f);
    color: #fff;
}

/* HEADER */
header {
    text-align: center;
    padding: 60px 20px 30px;
}

header h1 {
    font-size: 32px;
    margin: 0;
    letter-spacing: 1px;
}

header p {
    opacity: 0.7;
    margin-top: 10px;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 1000px;
    margin: auto;
}

/* CARD PREMIUM (GLASS EFFECT) */
.card {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: transform 0.25s ease, background 0.25s ease;
}

.card:hover {
    transform: translateY(-6px);
    background: rgba(255, 255, 255, 0.09);
}

/* NAME */
.name {
    font-weight: 600;
    margin-bottom: 10px;
    color: #ffd98a;
    font-size: 15px;
    letter-spacing: 0.5px;
}

/* MESSAGE */
.message {
    font-size: 15px;
    line-height: 1.6;
    opacity: 0.92;
}

/* DATE */
.date {
    margin-top: 12px;
    font-size: 11px;
    opacity: 0.45;
}

/* ANIMATION */
.fade-in {
    animation: fadeIn 0.6s ease forwards;
    opacity: 0;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>

<body>

<header>
    <h1>💌 Mensajes para los Novios</h1>
    <p>Palabras de amor, alegría y recuerdos de su día especial</p>
</header>

<div class="container" id="messages"></div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRMxc6lrRDsvXS4rR2Sh87zs-VqaMsfi1t2S2GhiPbAaTC6SF7YL1_h7MCdF4BSbjJ7adHGuglgAr_j/pub?gid=0&single=true&output=csv";

const container = document.getElementById("messages");

function parseCSV(text) {
    const rows = [];
    let row = [];
    let current = "";
    let inside = false;

    for (let i = 0; i < text.length; i++) {
        const c = text[i];

        if (c === '"' && text[i - 1] !== "\\") {
            inside = !inside;
        } else if (c === "," && !inside) {
            row.push(current.replace(/"/g, "").trim());
            current = "";
        } else if (c === "\n" && !inside) {
            row.push(current.replace(/"/g, "").trim());
            rows.push(row);
            row = [];
            current = "";
        } else {
            current += c;
        }
    }

    row.push(current.replace(/"/g, "").trim());
    rows.push(row);

    return rows;
}

function loadMessages() {

    fetch(SHEET_URL + "&t=" + Date.now())
        .then(r => r.text())
        .then(text => {

            container.innerHTML = "";

            const data = parseCSV(text);
            const headers = data[0].map(h => h.toLowerCase());

            const nameIndex = headers.findIndex(h =>
                h.includes("nombre") || h.includes("name")
            );

            const messageIndex = headers.findIndex(h =>
                h.includes("untitled long answer field")
            );

            const dateIndex = headers.findIndex(h =>
                h.includes("submitted") || h.includes("date") || h.includes("fecha")
            );

            data.slice(1).reverse().forEach(cols => {

                const name = cols[nameIndex] || "Invitado";
                const message = cols[messageIndex] || "";
                const date = cols[dateIndex] || "";

                if (!message) return;

                const card = document.createElement("div");
                card.className = "card fade-in";

                card.innerHTML = `
                    <div class="name">${name}</div>
                    <div class="message">${message}</div>
                    <div class="date">${date}</div>
                `;

                container.appendChild(card);
            });

        })
        .catch(err => {
            console.error(err);
            container.innerHTML = "<p style='opacity:0.6'>Error cargando mensajes</p>";
        });
}

loadMessages();
setInterval(loadMessages, 25000);

</script>

</body>
</html>
