<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensajes para los Novios</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f12;
    color: #fff;
}

header {
    text-align: center;
    padding: 60px 20px 30px;
}

header h1 {
    font-size: 32px;
    margin: 0;
    letter-spacing: 1px;
}

header p {
    opacity: 0.7;
    margin-top: 10px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 1000px;
    margin: auto;
}

.card {
    background: #1b1b22;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: transform 0.2s ease;
}

.card:hover {
    transform: translateY(-5px);
}

.name {
    font-weight: bold;
    margin-bottom: 10px;
    color: #ffd36e;
}

.message {
    font-size: 14px;
    line-height: 1.5;
    opacity: 0.9;
}

.date {
    margin-top: 15px;
    font-size: 11px;
    opacity: 0.5;
}
</style>

</head>

<body>

<header>
    <h1>💌 Mensajes para los Novios</h1>
    <p>Palabras de amor, alegría y recuerdos de su día especial</p>
</header>

<div class="container" id="messages"></div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRMxc6lrRDsvXS4rR2Sh87zs-VqaMsfi1t2S2GhiPbAaTC6SF7YL1_h7MCdF4BSbjJ7adHGuglgAr_j/pub?gid=0&single=true&output=csv";

const container = document.getElementById("messages");

function parseCSV(line) {
    let res = [];
    let cur = "";
    let inside = false;

    for (let i = 0; i < line.length; i++) {
        const c = line[i];

        if (c === '"' && line[i - 1] !== "\\") {
            inside = !inside;
        } else if (c === "," && !inside) {
            res.push(cur);
            cur = "";
        } else {
            cur += c;
        }
    }

    res.push(cur);
    return res.map(v => v.replace(/"/g, "").trim());
}

// 🔥 detecta si algo es ID tipo RGjkM2d
function isID(text) {
    return /^[A-Za-z0-9]{5,}$/.test(text) && text.length < 15;
}

fetch(SHEET_URL)
  .then(r => r.text())
  .then(text => {

    container.innerHTML = "";

    const rows = text.trim().split("\n");

    const headers = parseCSV(rows[0].toLowerCase());

    const nameIndex = headers.findIndex(h =>
        h.includes("name") || h.includes("nombre")
    );

    const dateIndex = headers.findIndex(h =>
        h.includes("date") || h.includes("fecha") || h.includes("time")
    );

    rows.slice(1).forEach(row => {

        if (!row.trim()) return;

        const cols = parseCSV(row);

        let name = cols[nameIndex] || "";
        let date = cols[dateIndex] || "";

        // 🔥 BUSCAR MENSAJE REAL (NO ID)
        let message = "";

        cols.forEach(col => {
            const clean = col.trim();

            if (!clean) return;
            if (clean === name) return;
            if (clean === date) return;
            if (isID(clean)) return; // 👈 elimina RGjkM2d

            // el mensaje suele ser el texto más largo
            if (clean.length > message.length) {
                message = clean;
            }
        });

        if (!message) return;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="name">${name || "Invitado"}</div>
            <div class="message">${message}</div>
            <div class="date">${date || ""}</div>
        `;

        container.appendChild(card);
    });

  })
  .catch(err => {
    console.error(err);
    container.innerHTML = "<p style='opacity:0.6'>No se pudieron cargar los mensajes</p>";
  });

</script>
</body>
</html>
