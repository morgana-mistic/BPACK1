<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensajes para los Novios</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(-45deg, #0b0b0f, #1a1a22, #0f0f18, #1c1c28);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
    color: #fff;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

header {
    text-align: center;
    padding: 60px 20px 30px;
}

header h1 {
    font-size: 32px;
    margin: 0;
    letter-spacing: 1px;
}

header p {
    opacity: 0.7;
    margin-top: 10px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 1000px;
    margin: auto;
}

/* CARD */
.card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 215, 130, 0.15);
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.3s ease;
}

.card:hover {
    transform: translateY(-8px);
    border-color: rgba(255, 215, 130, 0.35);
}

.name {
    font-weight: 600;
    margin-bottom: 10px;
    color: #ffd98a;
    font-size: 15px;
    letter-spacing: 0.5px;
}

.message {
    font-size: 15px;
    line-height: 1.6;
    opacity: 0.92;
    white-space: pre-wrap;
    word-break: break-word;
}

.date {
    margin-top: 12px;
    font-size: 11px;
    opacity: 0.45;
}

.fade-in {
    animation: fadeIn 0.6s ease forwards;
    opacity: 0;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>

<body>

<header>
    <h1>💌 Mensajes para los Novios</h1>
    <p>Palabras de amor, alegría y recuerdos de su día especial</p>
</header>

<div class="container" id="messages"></div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRMxc6lrRDsvXS4rR2Sh87zs-VqaMsfi1t2S2GhiPbAaTC6SF7YL1_h7MCdF4BSbjJ7adHGuglgAr_j/pub?gid=0&single=true&output=csv";

const container = document.getElementById("messages");

function parseCSV(text) {
    const rows = [];
    let row = [];
    let current = "";
    let insideQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"') {
            // Comillas escapadas ""
            if (insideQuotes && nextChar === '"') {
                current += '"';
                i++;
            } else {
                insideQuotes = !insideQuotes;
            }
        } else if (char === "," && !insideQuotes) {
            row.push(current.trim());
            current = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
            if (char === "\r" && nextChar === "\n") i++; // manejar CRLF
            row.push(current.trim());
            rows.push(row);
            row = [];
            current = "";
        } else {
            current += char;
        }
    }

    if (current.length > 0 || row.length > 0) {
        row.push(current.trim());
        rows.push(row);
    }

    return rows;
}

function escapeHtml(text) {
    return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function loadMessages() {
    fetch(SHEET_URL + "&t=" + Date.now())
        .then(r => r.text())
        .then(text => {
            const data = parseCSV(text);
            if (!data || data.length < 2) return;

            const headers = data[0].map(h => h.toLowerCase().trim());

            const nameIndex = headers.findIndex(h =>
                h.includes("nombre") || h.includes("name")
            );

            const messageIndex = headers.findIndex(h =>
                h.includes("untitled long answer field") || h.includes("mensaje")
            );

            const dateIndex = headers.findIndex(h =>
                h.includes("submitted") || h.includes("date") || h.includes("fecha")
            );

            // IMPORTANTE:
            // vaciamos y volvemos a dibujar TODO para evitar duplicados
            container.innerHTML = "";

            // invertimos el orden para que el MÁS NUEVO quede ARRIBA
            const rows = data.slice(1).reverse();

            rows.forEach(cols => {
                const name = (cols[nameIndex] || "Invitado").trim();
                const message = (cols[messageIndex] || "").trim();
                const date = (cols[dateIndex] || "").trim();

                if (!message) return;

                const card = document.createElement("div");
                card.className = "card fade-in";

                card.innerHTML = `
                    <div class="name">${escapeHtml(name)}</div>
                    <div class="message">${escapeHtml(message)}</div>
                    <div class="date">${escapeHtml(date)}</div>
                `;

                container.appendChild(card);
            });
        })
        .catch(err => {
            console.error("Error cargando mensajes:", err);
        });
}

loadMessages();
setInterval(loadMessages, 20000);
</script>

</body>
</html>
